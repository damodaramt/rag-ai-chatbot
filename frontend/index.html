<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RAG Chat Pro</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    display: flex;
    height: 100vh;
    background: #343541;
    color: white;
}

/* SIDEBAR */
#sidebar {
    width: 260px;
    background: #202123;
    padding: 10px;
    overflow-y: auto;
}

.chat-item {
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 5px;
    background: #2a2b32;
}

.chat-item:hover {
    background: #3a3b42;
}

.chat-item.active {
    background: #4caf50;
}

/* MAIN */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* CHAT */
#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* MESSAGE */
.msg {
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    max-width: 70%;
    position: relative;
}

.user {
    background: #4caf50;
    margin-left: auto;
}

.bot {
    background: #444654;
}

/* COPY BUTTON */
.copy-btn {
    position: absolute;
    top: 5px;
    right: 8px;
    cursor: pointer;
    font-size: 12px;
    color: #aaa;
}

/* INPUT */
#input-area {
    display: flex;
    padding: 10px;
    background: #40414f;
}

#input {
    flex: 1;
    padding: 10px;
    border: none;
}

/* RIGHT PANEL */
#sources {
    width: 300px;
    background: #202123;
    padding: 10px;
    overflow-y: auto;
    border-left: 1px solid #444;
}
</style>

<!-- MARKDOWN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<!-- LEFT -->
<div id="sidebar">
    <h3>Chats</h3>
    <button onclick="createChat()">+ New Chat</button>
    <div id="chat-list"></div>

    <hr>
    <h3>Upload PDF</h3>
    <input type="file" id="upload">
    <button onclick="uploadPDF()">Upload</button>
</div>

<!-- CENTER -->
<div id="main">
    <div id="chat-box"></div>

    <div id="input-area">
        <input id="input" placeholder="Ask anything...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- RIGHT -->
<div id="sources">
    <h3>Sources</h3>
    <div id="sources-content"></div>
</div>

<script>

let currentChatId = null;

/* INIT */
window.onload = () => {
    loadChats();

    document.getElementById("input").addEventListener("keydown", e => {
        if (e.key === "Enter") sendMessage();
    });
};

/* LOAD CHATS */
async function loadChats() {
    const res = await fetch("/api/conversations");
    const chats = await res.json();

    let list = document.getElementById("chat-list");
    list.innerHTML = "";

    chats.forEach(c => {
        let div = document.createElement("div");
        div.className = "chat-item";
        div.innerText = c.title;

        div.onclick = () => {
            currentChatId = c.id;
            loadMessages(c.id);
        };

        list.appendChild(div);
    });
}

/* CREATE CHAT */
async function createChat() {
    const res = await fetch("/api/new_chat", { method: "POST" });
    const data = await res.json();

    currentChatId = data.id;
    document.getElementById("chat-box").innerHTML = "";
    loadChats();
}

/* LOAD MESSAGES */
async function loadMessages(id) {
    const res = await fetch(`/api/messages/${id}`);
    const msgs = await res.json();

    let box = document.getElementById("chat-box");
    box.innerHTML = "";

    msgs.forEach(m => {
        addMessage(m.content, m.role);
    });
}

/* SEND MESSAGE */
async function sendMessage() {

    let input = document.getElementById("input");
    let text = input.value.trim();
    if (!text) return;

    if (!currentChatId) await createChat();

    input.value = "";

    addMessage(text, "user");

    let botMsg = addMessage("", "bot");

    const res = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            prompt: text,
            user_id: currentChatId
        })
    });

    const data = await res.json();
    let fullText = data.response || "No response";

    // SPLIT SOURCES
    let parts = fullText.split("Sources:");
    let answer = parts[0];
    let sources = parts[1] || "";

    // SHOW SOURCES
    document.getElementById("sources-content").innerText = sources;

    // TYPE EFFECT
    let i = 0;
    function type() {
        if (i < answer.length) {
            botMsg.innerHTML += answer.charAt(i);
            i++;
            setTimeout(type, 10);
        }
    }
    type();
}

/* ADD MESSAGE */
function addMessage(text, role) {

    let div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "bot");

    // MARKDOWN
    div.innerHTML = marked.parse(text);

    // COPY BUTTON
    let copy = document.createElement("span");
    copy.innerText = "Copy";
    copy.className = "copy-btn";

    copy.onclick = () => {
        navigator.clipboard.writeText(text);
    };

    div.appendChild(copy);

    let box = document.getElementById("chat-box");
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;

    return div;
}

/* UPLOAD PDF */
async function uploadPDF() {
    let file = document.getElementById("upload").files[0];

    let form = new FormData();
    form.append("file", file);

    await fetch("/api/upload_pdf", {
        method: "POST",
        body: form
    });

    alert("PDF uploaded!");
}

</script>

</body>
</html>
