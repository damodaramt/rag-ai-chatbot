<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RAG Chat Pro</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    display: flex;
    height: 100vh;
    background: #343541;
    color: white;
}

#sidebar {
    width: 260px;
    background: #202123;
    padding: 10px;
    overflow-y: auto;
}

.chat-item {
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 5px;
    background: #2a2b32;
}

#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #4caf50;
    margin-left: auto;
}

.bot {
    background: #444654;
    white-space: pre-wrap;
}

#input-area {
    display: flex;
    padding: 10px;
    background: #40414f;
}

#input {
    flex: 1;
    padding: 10px;
}

#sources {
    width: 300px;
    background: #202123;
    padding: 10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<div id="sidebar">
    <h3>Chats</h3>
    <button onclick="createChat()">+ New Chat</button>
    <div id="chat-list"></div>

    <hr>
    <h3>Upload PDF</h3>
    <input type="file" id="upload">
    <button onclick="uploadPDF()">Upload</button>
</div>

<div id="main">
    <div id="chat-box"></div>

    <div id="input-area">
        <input id="input" placeholder="Ask anything...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<div id="sources">
    <h3>Sources</h3>
    <div id="sources-content"></div>
</div>

<script>

let currentChatId = null;

// INIT
window.onload = () => {
    loadChats();
    document.getElementById("input").addEventListener("keydown", e => {
        if (e.key === "Enter") sendMessage();
    });
};

// LOAD CHATS
async function loadChats() {
    const res = await fetch("/api/conversations");
    const chats = await res.json();

    let list = document.getElementById("chat-list");
    list.innerHTML = "";

    chats.forEach(c => {
        let div = document.createElement("div");
        div.className = "chat-item";
        div.innerText = c.title;

        div.onclick = () => {
            currentChatId = c.id;
            loadMessages(c.id);
        };

        list.appendChild(div);
    });
}

// CREATE CHAT
async function createChat() {
    const res = await fetch("/api/new_chat", { method: "POST" });
    const data = await res.json();

    currentChatId = data.id;
    document.getElementById("chat-box").innerHTML = "";
    loadChats();
}

// LOAD MESSAGES
async function loadMessages(id) {
    const res = await fetch(`/api/messages/${id}`);
    const msgs = await res.json();

    let box = document.getElementById("chat-box");
    box.innerHTML = "";

    msgs.forEach(m => {
        addMessage(m.content, m.role);
    });
}

// 🔥 FINAL STREAM SAFE VERSION
async function sendMessage() {

    let input = document.getElementById("input");
    let text = input.value.trim();
    if (!text) return;

    if (!currentChatId) await createChat();

    input.value = "";

    addMessage(text, "user");
    let botMsg = addMessage("...", "bot");

    try {
        const response = await fetch("/api/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                prompt: text,
                user_id: currentChatId
            })
        });

        if (!response.body) {
            throw new Error("No stream body");
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        let fullText = "";

        while (true) {
            const { done, value } = await reader.read();

            if (done) break;

            if (!value) continue;

            const chunk = decoder.decode(value, { stream: true });

            if (!chunk) continue;

            fullText += chunk;

            let parts = fullText.split("### Sources:");
            let answer = parts[0];
            let sources = parts[1] || "";

            botMsg.innerHTML = marked.parse(answer);

            document.getElementById("sources-content").innerHTML =
                marked.parse(sources);

            document.getElementById("chat-box").scrollTop = 999999;
        }

    } catch (err) {
        console.error("🔥 STREAM ERROR:", err);
        botMsg.innerHTML += "\n\n⚠️ Connection interrupted. Partial response shown.";
    }
}

// ADD MESSAGE
function addMessage(text, role) {
    let div = document.createElement("div");
    div.className = "msg " + role;
    div.innerHTML = marked.parse(text);

    document.getElementById("chat-box").appendChild(div);
    return div;
}

// UPLOAD PDF
async function uploadPDF() {
    let file = document.getElementById("upload").files[0];

    if (!file) {
        alert("Select file first");
        return;
    }

    let form = new FormData();
    form.append("file", file);

    try {
        let res = await fetch("/api/upload_pdf", {
            method: "POST",
            body: form
        });

        let data = await res.json();

        if (res.ok) {
            alert("✅ Upload success");
        } else {
            alert("❌ Error: " + data.error);
        }

    } catch (err) {
        alert("❌ Upload failed");
    }
}

</script>

</body>
</html>
